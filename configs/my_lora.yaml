  use_ema: true
  ema_decay: 0.9999
  batch_size: 8
  grad_accum: 1
  lr: 0.0001
  optimizer: muon
  lr_scheduler: cosine
  warmup_steps: 200
  max_steps: 8000
  save_every: 500
  log_every: 10
  valid_ratio: 0.03
  valid_every: 100
  wandb_enabled: false
  wandb_project: ''
  wandb_run_name: ''
  seed: 0
