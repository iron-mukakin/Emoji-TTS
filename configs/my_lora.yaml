lora:
  lora_rank: 16
  lora_alpha: 32.0
  lora_dropout: 0.05
  target_modules: wq,wk,wv,wo
  save_mode: EMAのみ
  attention_backend: sdpa
  use_early_stopping: true
  es_patience: 10
